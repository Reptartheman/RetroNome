<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />
    <title>RetroNome</title>
    <script type="module" crossorigin src="/assets/index-CHRqHsHa.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BEHXGbp4.css">
  </head>
  <body>
    <div class="gameboy">
      <!-- Top curved section with branding -->
      <div class="gameboy-top">
        <span class="brand-color">RetroNome v2</span>
      </div>
      
      <!-- Screen section -->
      <div class="screen-bezel">
        <div class="screen-inner">
          <div class="status-bar">
            <span class="tempo">120 BPM</span>
            <span class="beat-count-display">
              <span class="beat-count">4</span>
              <span class="beat-label">beats</span>
            </span>
          </div>
          <div id="timeBlocksContainer" class="time-blocks-container">
            <div class="time-block">1</div>
            <div class="time-block">2</div>
            <div class="time-block">3</div>
            <div class="time-block">4</div>
          </div>
        </div>
      </div>

      <!-- Controls section -->
      <div class="controls-section">
        <!-- D-Pad -->
        <div class="dpad-container">
          <div class="dpad">
            <button class="dpad-btn dpad-up" id="dpadUp" aria-label="Increase tempo">
              <span class="dpad-arrow">▲</span>
            </button>
            <button class="dpad-btn dpad-left" id="dpadLeft" aria-label="Remove beat">
              <span class="dpad-arrow"></span>
            </button>
            <div class="dpad-center"></div>
            <button class="dpad-btn dpad-right" id="dpadRight" aria-label="Add beat">
              <span class="dpad-arrow"></span>
            </button>
            <button class="dpad-btn dpad-down" id="dpadDown" aria-label="Decrease tempo">
              <span class="dpad-arrow">▼</span>
            </button>
          </div>
        </div>

        <!-- A/B Buttons -->
        <div class="ab-buttons-container">
          <button class="action-btn btn-b start-stop" id="btnStop">
            <span class="stop-icon"></span>
          </button>
          <button class="action-btn btn-a start-stop" id="btnStart">
            <span class="play-arrow"></span>
          </button>
        </div>
      </div>

      <!-- Small buttons row -->
      <div class="small-buttons-row">
        <div class="small-buttons">
          <button class="small-btn" id="selectBtn">COLORS</button>
          <button class="small-btn" id="startBtn">TONES</button>
        </div>
      </div>

      <!-- Speaker grille -->
      <div class="speaker-section">
        <div class="speaker-grille">
          <div class="speaker-line"></div>
          <div class="speaker-line"></div>
          <div class="speaker-line"></div>
          <div class="speaker-line"></div>
          <div class="speaker-line"></div>
          <div class="speaker-line"></div>
        </div>
      </div>
    </div>
  </body>
</html>
